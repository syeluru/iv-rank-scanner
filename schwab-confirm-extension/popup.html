<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 260px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #ffffff;
      margin: 0;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: 14px;
      margin: 0;
      font-weight: 600;
    }
    .shield {
      font-size: 20px;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .toggle-label {
      font-size: 13px;
      color: #aaaacc;
    }
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #333355;
      border-radius: 24px;
      transition: 0.2s;
    }
    .slider:before {
      content: "";
      position: absolute;
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.2s;
    }
    input:checked + .slider {
      background: #22aa44;
    }
    input:checked + .slider:before {
      transform: translateX(20px);
    }
    .status {
      font-size: 12px;
      text-align: center;
      color: #666688;
    }
    .status.active {
      color: #44cc66;
    }
    .info {
      margin-top: 12px;
      font-size: 11px;
      color: #555577;
      line-height: 1.4;
    }
    .delays {
      margin-top: 12px;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 8px;
    }
    .delays h3 {
      font-size: 11px;
      color: #6666aa;
      margin: 0 0 6px 0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .delay-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      padding: 2px 0;
    }
    .delay-label { color: #aaaacc; }
    .delay-value { color: #ffffff; font-weight: 500; }
    .delay-value.high { color: #ff4444; }
    .delay-value.med { color: #ff9900; }
    .delay-value.low { color: #4488ff; }
  </style>
</head>
<body>
  <div class="header">
    <span class="shield">&#128737;</span>
    <h1>Schwab Trade Confirm</h1>
  </div>

  <div class="toggle-row">
    <span class="toggle-label">Click Protection</span>
    <label class="toggle">
      <input type="checkbox" id="enableToggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="status active" id="statusText">Protection Active</div>

  <div class="delays">
    <h3>Confirm Delay</h3>
    <div class="delay-row">
      <span class="delay-label">Trade Actions</span>
      <span class="delay-value high">2.0s</span>
    </div>
    <div class="delay-row">
      <span class="delay-label">Navigation</span>
      <span class="delay-value med">1.0s</span>
    </div>
    <div class="delay-row">
      <span class="delay-label">Other Clicks</span>
      <span class="delay-value low">0.5s</span>
    </div>
  </div>

  <div class="info">
    Active on schwab.com. Every click requires confirmation before proceeding.
  </div>

  <script src="popup.js"></script>
</body>
</html>
